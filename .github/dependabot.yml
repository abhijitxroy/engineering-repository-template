

version: 2

updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------

  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 10

    labels:
      - "dependencies"
      - "github-actions"
      - "automation"

    commit-message:
      prefix: "deps"
      include: "scope"

  # ---------------------------------------------------------------------------
  # Docker (Future Support)
  # ---------------------------------------------------------------------------

  - package-ecosystem: "docker"
    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "docker"

  # ---------------------------------------------------------------------------
  # Terraform (Future Support)
  # ---------------------------------------------------------------------------

  - package-ecosystem: "terraform"
    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "terraform"