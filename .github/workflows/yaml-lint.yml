name: YAML Lint

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yaml-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run yamllint validation
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          strict: false

      - name: Workflow summary
        run: |
          echo "YAML lint validation completed successfully."
