name: Spell Check

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spell-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spell-check:
    name: Documentation Spell Validation
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run cspell validation
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: |
            **/*.md
            **/*.txt
          config: ".github/cspell.json"

      - name: Workflow summary
        run: |
          echo "Spell check validation completed successfully."
