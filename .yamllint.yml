extends: default

ignore: |
  .git/
  node_modules/

rules:
  line-length:
    max: 160
    level: warning

  document-start:
    present: false

  truthy:
    allowed-values:
      - "true"
      - "false"
      - "on"

  comments:
    min-spaces-from-content: 1

  indentation:
    spaces: 2
    indent-sequences: consistent

  trailing-spaces: enable

  empty-lines:
    max: 2
    max-start: 0
    max-end: 1
